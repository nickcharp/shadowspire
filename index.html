<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shadow Spire Ascension</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
	<!-- Custom Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap">
<!-- font-family: 'UnifrakturMaguntia', Verdana, cursive; -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Metal+Mania&display=swap">
<!-- font-family: 'Metal Mania', Verdana, cursive; -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans:400,600,700,800">
	
	<link rel="icon" type="image/png" href="images/NC_icon.png"/>
	
    <style>
        body {
            background-color: #1a1a1a;
        }
        h1 {
            color: #bfbfbf;
			font-size: 45px;
			font-family: 'UnifrakturMaguntia', Verdana, cursive;
			padding-top: 25px;
        }
		
		/* Horizontal Section Divider */
		hr.glow {
			border: none;
			height: 2px;
			width: 70%;
			margin: 30px auto;
			background: linear-gradient(to right, transparent, #ffffff 30%, #ffffff 70%, transparent);
			/*GREEN
			background: linear-gradient(to right, transparent, #32CD32 30%, #32CD32 70%, transparent);
			*/
			box-shadow: 0 0 10px rgba(50, 205, 50, 0.45);
			opacity: 0.85;
		}

		/* Divider animations – add class like "animate-breathe" to <hr class="glow animate-breathe"> */
		
		@keyframes breatheExpand {
			0%   { opacity: 0.50;   width: 40%;   }
			50%  { opacity: 0.90; width: 80%; }
			100% { opacity: 0.50;   width: 40%;   }
		}

		hr.glow.animate-breathe {
			animation: breatheExpand 10s infinite ease-in-out;
		}
		
        /* Shadow Spire Ascension Styles */
        .game-container {
            max-width: 600px;
            margin: 20px auto;
        }
        .game-output {
            font-family: monospace;
            background-color: #000000;
            padding: 10px;
            border-radius: 5px;
            min-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            text-align: left;
            color: #ffffff;
            resize: vertical;
        }
        .text-limegreen {
            color: #32CD32;
        }
		
		
		/* Speed Trainer Metronome */
.metronome-container {
    padding: 20px;
}

.circle {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background-color: #495057;
    margin: 10px;
    display: inline-block;
    cursor: pointer;
    transition: all 0.2s;
}

.circle.active {
    background-color: #dc3545;
}

.circle.emphasis {
    border: 3px solid #ffc107;
}

.controls {
    max-width: 600px;
    margin: 20px auto;
}

.form-label {
	color: #ffffff;
}

.form-range::-webkit-slider-thumb {
    background-color: #32CD32;
}

.form-range::-moz-range-thumb {
    background-color: #32CD32;
}

.form-range::-ms-thumb {
    background-color: #32CD32;
}

.form-range:focus::-webkit-slider-thumb {
    box-shadow: 0 0 0 1px #fff, 0 0 0 0.25rem rgba(50, 205, 50, 0.25);
}

.form-range:focus::-moz-range-thumb {
    box-shadow: 0 0 0 1px #fff, 0 0 0 0.25rem rgba(50, 205, 50, 0.25);
}

.form-range:focus::-ms-thumb {
    box-shadow: 0 0 0 1px #fff, 0 0 0 0.25rem rgba(50, 205, 50, 0.25);
}
		
		
		.footer {
        margin-top: 0px;
        font-size: 11px;
		padding-bottom: 25px;
        color: #666;
		}
    </style>
</head>




<body>
    <div class="container-fluid text-center" id="shadowspire">
		<h1 class="mb-4">shadow spire ascension</h1>
		<hr class="glow animate-breathe">
<!--
        <h1 class="mb-4">...a Shadow/Wraith Themed Ascension Game</h1>
-->
    </div>
    <div class="game-container text-center">
        <div id="gameOutput" class="game-output"></div>
        <button id="rollBonesBtn" class="btn btn-success btn-lg mt-3">Roll Your Bones</button>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script>
        class ShadowSpireAscension {
            constructor() {
                this.degree_wins = { "Lightbringers": 0, "Shadowcasters": 0 };
                this.asc_this_degree = { "Lightbringers": 0, "Shadowcasters": 0 };
                this.walkers = [];
                this.deaths = 0;
                this.degree = 1;
                this.half_degree = "Top";
                this.gameLog = [];
                this.rollCount = 0;
                this.intro = `You have been summoned by the Order of the Ashen Blood to ascend the immense spire before you, symbolic of your life and the ritualistic work you are here to undertake.  Beginning in the shadow haze of the circle surrounding the spire, you will approach the spiral staircase to heights signifying the Body, Mind, and Spirit disciplines, in order to establish the Shadow Triumvirate. Each Seeker conceals themselves, and proceeds lurking about the flights of the spire with blade in hand and magickal forces at ready, in pursuit of the cultivation of their grey-blooded essence, confronting enemies within themselves and within striking distance.
            ||
  )========{{[/////////////////////////==--
            ||
                               ||
  --==/////////////////////////]}}========(
                               ||
`;
                this.gameLog.push(this.intro);
                this.statements = {
                    single: [
                        "Walking the Golden Path, cutting through the terrors, illusions, and distractions of this reality, and remaining steadfast, stoic, and forthright in the pursuit of wisdom, balance, power, and perfection.",
                        "Advancing on the Golden Path, slicing away fears and deceptions, holding firm in the quest for equilibrium and mastery.",
                        "Treading the Golden Path with unyielding resolve, dispelling shadows of doubt to embrace wisdom and strength.",
                        "Progressing along the Golden Path, enduring illusions with stoicism, driven by the pursuit of perfect harmony.",
                        "Navigating the Golden Path, overcoming distractions with fortitude, seeking ultimate power and enlightenment."
                    ],
                    death5: [
                        "Torn apart by wolves emerging from the shadow haze.",
                        "Ambushed by wraiths lurking in the misty veil.",
                        "Torn asunder by grasping shadow hands from the void.",
                        "Falling irreversibly ill to the spire's insidious curse."
                    ],
                    death6: [
                        "Losing oneself in the endless wilderness of shadows.",
                        "Struck down by invisible forces of the encroaching void.",
                        "Consumed by the creeping darkness from within.",
                        "Perishing from a fatal misstep into the abyssal fog.",
                        "Vanishing into the labyrinthine depths of eternal night."
                    ],
                    sac9: [
                        "Slain by flying discs hurled from the impenetrable darkness.",
                        "Pierced by burning arrows infused with shadow fire.",
                        "Sacrificing oneself through self-immolation as a distraction, allowing others to ascend.",
                        "Offering life in a ritual blaze to pave the way for fellow shadows."
                    ],
                    shadowInit: [
                        "An ancient Wraith lunges at you from out of the fog, as you approach the steps… Fight to advance, or die trying.",
                        "From the misty shroud, an elder Wraith attacks... Battle for your progression or face oblivion.",
                        "A spectral Wraith emerges from the haze, blade drawn... Duel for ascent or perish in the shadows.",
                        "Out of the fog, an ancient adversary strikes... Fight with valor to move forward, or fall."
                    ],
                    shadowWin: [
                        "You vanquish the Wraith with a swift dagger thrust, allowing your Seeker to advance.",
                        "Overpowering the ancient foe, your Seeker claims victory and steps onto the first Flight.",
                        "With skillful parries and strikes, you defeat the Wraith, securing passage forward.",
                        "The Wraith falls to your blade; your Seeker advances unscathed."
                    ],
                    shadowLose: [
                        "The Wraith overwhelms you, claiming your Seeker's life in fierce combat.",
                        "Defeated by the ancient specter, the Seeker succumbs to the shadows.",
                        "Outmatched in the duel, your Seeker perishes at the Wraith's hand.",
                        "The Wraith's blade strikes true; the Seeker dies in battle."
                    ],
                    elderInit: [
                        "A powerful and revered Shadow Elder standing before you, as you approach the steps… To evade his blade is your only chance to advance. Move now with cunning stealth, or die trying.",
                        "Confronted by a mighty Shadow Elder... Employ stealth to slip past, or face certain death.",
                        "A venerable Elder blocks your path, watchful and deadly... Evade with guile or perish.",
                        "The Elder awaits, blade poised... Use cunning to advance, or meet your end."
                    ],
                    elderWin: [
                        "With cunning stealth, you evade the Elder's blade, allowing your Lead Walker to advance.",
                        "Slipping past the revered foe's defenses, your Lead Walker progresses along the path.",
                        "Employing shadow guile, you outmaneuver the Elder; advancement is yours.",
                        "The Elder is eluded; your Lead Walker ascends to the next Flight."
                    ],
                    elderLose: [
                        "The Elder strikes with unerring precision, slaying your Lead Walker in the confrontation.",
                        "Unable to evade, your Lead Walker falls to the Elder's formidable blade.",
                        "Outwitted by the revered guardian, death claims your Lead Walker.",
                        "The Elder's vigilance prevails; your Lead Walker perishes."
                    ]
                };
                this.determineFirst();
                this.logDegreeStart();
                this.game_over = false;
            }

            rollDice() {
                return [Math.floor(Math.random() * 6) + 1, Math.floor(Math.random() * 6) + 1];
            }

            getRandomStatement(type) {
                const arr = this.statements[type];
                return arr[Math.floor(Math.random() * arr.length)];
            }

            determineFirst() {
                let lightRoll, shadowRoll;
                while (true) {
					this.gameLog.push(`<span class="text-limegreen">*****************************************************</span>`);
                    lightRoll = this.rollDice().reduce((a, b) => a + b, 0);
                    shadowRoll = this.rollDice().reduce((a, b) => a + b, 0);
                    this.gameLog.push(`<span class="text-danger">Lightbringers</span> rolled: ${lightRoll}`);
                    this.gameLog.push(`<span class="text-success">Shadowcasters</span> rolled: ${shadowRoll}`);
                    if (lightRoll !== shadowRoll) {
                        if (lightRoll < shadowRoll) {
                            this.away_team = "Lightbringers";
                            this.home_team = "Shadowcasters";
                            this.gameLog.push(`<span class="text-danger">Lightbringers</span> will approach the Spire first.`);
                            this.gameLog.push(`<span class="text-success">Shadowcasters</span> have the advantage.`);
                        } else {
                            this.away_team = "Shadowcasters";
                            this.home_team = "Lightbringers";
                            this.gameLog.push(`<span class="text-success">Shadowcasters</span> will approach the Spire first.`);
                            this.gameLog.push(`<span class="text-danger">Lightbringers</span> have the advantage.`);
                        }
                        break;
                    } else {
                        this.gameLog.push("It's a draw! Rolling again.");
                    }
                }
                this.current_team = this.away_team;
            }

            logDegreeStart() {
                let startText;
                if (this.degree === 1) {
                    startText = "The Trial of the Body now begins… Raise your hood, unsheath your blade, and move forth.";
                } else if (this.degree === 2) {
                    startText = "The Tribunal of the Mind now begins… Sharpen your wits in the shadows, refine your thoughts with cunning edge, and ascend with mental acuity.";
                } else if (this.degree === 3) {
                    startText = "The Ritual of the Spirit within the Temple of the Astral Shadow, the final phase of existential battle, now begins… Embrace the ethereal, channel the astral forces, and uplift your essence to transcendent heights.";
                } else if (this.degree === 4) {
                    startText = "The Ritual of the Spirit within the Temple of the Astral Shadow continues… The battle intensifies, shadows deepen; seek the inner light amidst the void.";
                } else if (this.degree === 5) {
                    startText = "The Ritual of the Spirit within the Temple of the Astral Shadow continues… This is the absolute final Degree; both wraith warriors have endured, but only one shall ascend to the apex, transmuting their soul to achieve Shadow Mastery.";
                }
                this.gameLog.push(startText);
                this.gameLog.push(`<span class="text-limegreen">*****************************************************</span>`);
            }

            getDegreeName(d) {
                if (d === 1) return "The Trial of the Body";
                if (d === 2) return "The Tribunal of the Mind";
                return "The Ritual of the Spirit within the Temple of the Astral Shadow";
            }

            getTeamSpan(team) {
                return team === "Lightbringers" ? "text-danger" : "text-success";
            }

            processPlay() {
                if (this.deaths >= 3 || this.asc_this_degree[this.current_team] >= 3) {
                    this.switchHalf();
                    return true;
                }
                this.rollCount++;
                const [d1, d2] = this.rollDice();
                const rollSum = d1 + d2;
                this.gameLog.push(`<span class="${this.getTeamSpan(this.current_team)}">${this.current_team}</span> rolled ${d1} and ${d2} (Total: ${rollSum})`);
                let statement;
                if ([2, 12].includes(rollSum)) {
                    statement = rollSum === 2 ? "Wielding the Shade Blade as an extension of the aura, and thrusting forth all Shadows to Ascension." : "Donning the Shade Cloak, invisible to the adversaries, enshrouding and ushering forth all Shadows to Ascension.";
                    this.gameLog.push(`<span class="text-warning">${statement}</span>`);
                    this.scoreAscensions(this.walkers.length + 1);
                    this.walkers = [];
                } else if (rollSum === 3) {
                    statement = "Entering a trance-induced Portal of the Three Schools Triarchy, formed within by the all-consuming chaotic flame of Unis’ae Noc, and driving forward all other Shadow Walkers along the Golden Path";
                    this.gameLog.push(`<span class="text-warning">${statement}</span>`);
                    this.advanceWalkers(3);
                } else if (rollSum === 11) {
                    statement = "Entering a trance-induced Portal of Duality, formed within by the all-consuming chaotic flame of Unis’ae Noc, and driving forward all other Shadow Walkers along the Golden Path";
                    this.gameLog.push(`<span class="text-warning">${statement}</span>`);
                    this.advanceWalkers(2);
                } else if ([4, 10].includes(rollSum)) {
                    statement = this.getRandomStatement("single");
                    this.gameLog.push(`<span class="text-warning">${statement}</span>`);
                    this.advanceWalkers(1);
                } else if (rollSum === 5) {
                    statement = this.getRandomStatement("death5");
                    this.gameLog.push(`<span class="text-warning">${statement}</span>`);
                    this.deaths += 1;
                } else if (rollSum === 6) {
                    statement = this.getRandomStatement("death6");
                    this.gameLog.push(`<span class="text-warning">${statement}</span>`);
                    this.deaths += 1;
                } else if (rollSum === 9) {
                    this.processSacrificialDeath();
                } else if (rollSum === 7) {
                    this.processShadowDuel();
                } else if (rollSum === 8) {
                    this.processElderDuel();
                }
                if (this.asc_this_degree[this.current_team] >= 3) {
                    this.gameLog.push(`<span class="text-warning">${this.current_team} has attained maximum Ascensions! This attempt has come to an end.</span>`);
                    this.switchHalf();
                    return true;
                }
                if (this.deaths >= 3) {
                    this.switchHalf();
                    return true;
                }
                return false;
            }

            advanceWalkers(advancement) {
                let scored = 0;
                const newWalkers = [];
                for (const base of this.walkers.sort((a, b) => a - b)) {
                    const newBase = base + advancement;
                    if (newBase > 3) {
                        scored += 1;
                    } else {
                        newWalkers.push(newBase);
                    }
                }
                if (advancement > 0) {
                    const batterBase = Math.min(advancement, 3);
                    newWalkers.push(batterBase);
                }
                this.walkers = newWalkers.sort((a, b) => a - b);
                this.scoreAscensions(scored);
            }

            scoreAscensions(num) {
                const current = this.asc_this_degree[this.current_team];
                const toAdd = Math.min(num, 3 - current);
                this.asc_this_degree[this.current_team] += toAdd;
                if (toAdd < num) {
                    this.gameLog.push(`<span class="text-warning">Ascensions capped at maximum of 3; ${num - toAdd} lost to the shadows.</span>`);
                }
            }

            advanceWalk() {
                if (this.walkers.length < 3) {
                    this.walkers.sort((a, b) => a - b);
                    if (!this.walkers.includes(1)) {
                        this.walkers.push(1);
                    } else if (!this.walkers.includes(2)) {
                        this.walkers[this.walkers.indexOf(1)] = 2;
                        this.walkers.push(1);
                    } else if (!this.walkers.includes(3)) {
                        this.walkers[this.walkers.indexOf(2)] = 3;
                        this.walkers[this.walkers.indexOf(1)] = 2;
                        this.walkers.push(1);
                    }
                } else {
                    this.scoreAscensions(1);
                }
                this.walkers = this.walkers.sort((a, b) => a - b);
            }

            processSacrificialDeath() {
                const statement = this.getRandomStatement("sac9");
                this.gameLog.push(`<span class="text-warning">${statement}</span>`);
                if (!this.walkers.length) {
                    this.deaths += 1;
                } else if (this.deaths === 2) {
                    this.gameLog.push(`<span class="text-warning">Sacrificial Death with 2 Deaths already; Walkers do not advance.</span>`);
                    this.deaths += 1;
                } else {
                    let scored = 0;
                    if (this.walkers.includes(3)) {
                        scored += 1;
                        this.walkers.splice(this.walkers.indexOf(3), 1);
                    }
                    if (this.walkers.includes(2)) {
                        this.walkers[this.walkers.indexOf(2)] = 3;
                    }
                    if (this.walkers.includes(1)) {
                        this.walkers[this.walkers.indexOf(1)] = 2;
                    }
                    this.deaths += 1;
                    this.scoreAscensions(scored);
                }
            }

            processShadowDuel() {
                const initStmt = this.getRandomStatement("shadowInit");
                this.gameLog.push(`<span class="text-warning">${initStmt}</span>`);
                let batterSum, oppSum;
                do {
                    const batterRoll = this.rollDice();
                    const oppRoll = this.rollDice();
                    batterSum = batterRoll[0] + batterRoll[1];
                    oppSum = oppRoll[0] + oppRoll[1];
                    this.gameLog.push(`Your roll: ${batterSum} Opponent's roll: ${oppSum}`);
                    if (batterSum === oppSum) {
                        this.gameLog.push(`<span class="text-warning">Blows are parried effectively; the duel intensifies—roll again.</span>`);
                    }
                } while (batterSum === oppSum);
                let outcomeStmt;
                if (batterSum > oppSum) {
                    outcomeStmt = this.getRandomStatement("shadowWin");
                    this.gameLog.push(`<span class="text-warning">${outcomeStmt}</span>`);
                    this.advanceWalk();
                } else {
                    outcomeStmt = this.getRandomStatement("shadowLose");
                    this.gameLog.push(`<span class="text-warning">${outcomeStmt}</span>`);
                    this.deaths += 1;
                }
            }

            processElderDuel() {
                const initStmt = this.getRandomStatement("elderInit");
                this.gameLog.push(`<span class="text-warning">${initStmt}</span>`);
                let batterSum, oppSum;
                do {
                    const batterRoll = this.rollDice();
                    const oppRoll = this.rollDice();
                    batterSum = batterRoll[0] + batterRoll[1];
                    oppSum = oppRoll[0] + oppRoll[1];
                    this.gameLog.push(`Your roll: ${batterSum} Opponent's roll: ${oppSum}`);
                    if (batterSum === oppSum) {
                        this.gameLog.push(`<span class="text-warning">Blows are parried effectively; the duel intensifies—roll again.</span>`);
                    }
                } while (batterSum === oppSum);
                let outcomeStmt;
                if (batterSum > oppSum) {
                    outcomeStmt = this.getRandomStatement("elderWin");
                    this.gameLog.push(`<span class="text-warning">${outcomeStmt}</span>`);
                    if (this.walkers.length === 0) {
                        this.walkers.push(1);
                    } else {
                        const lead = Math.max(...this.walkers);
                        const index = this.walkers.indexOf(lead);
                        const newLead = lead + 1;
                        if (newLead > 3) {
                            this.scoreAscensions(1);
                            this.walkers.splice(index, 1);
                        } else {
                            this.walkers[index] = newLead;
                        }
                    }
                } else {
                    outcomeStmt = this.getRandomStatement("elderLose");
                    this.gameLog.push(`<span class="text-warning">${outcomeStmt}</span>`);
                    this.deaths += 1;
                    if (this.walkers.length > 0) {
                        const lead = Math.max(...this.walkers);
                        const index = this.walkers.indexOf(lead);
                        this.walkers.splice(index, 1);
                    }
                }
            }

            updateStatus() {
                this.printFlightStatus();
                this.gameLog.push(`Score: <span class="${this.getTeamSpan("Lightbringers")}">Lightbringers</span> <span class="text-warning">${this.asc_this_degree["Lightbringers"]}</span> - <span class="${this.getTeamSpan("Shadowcasters")}">Shadowcasters</span> <span class="text-warning">${this.asc_this_degree["Shadowcasters"]}</span>`);
                this.gameLog.push(`Deaths: <span class="text-warning">${this.deaths}</span>`);
                if (this.deaths < 3) {
                    this.gameLog.push(`<span class="text-limegreen">${"*".repeat(this.rollCount)}</span>`);
                }
            }

            printFlightStatus() {
                const flights = ["1st", "2nd", "3rd"];
                if (!this.walkers.length) {
                    this.gameLog.push("All Flights of the Spiral Stairway are empty.");
                } else {
                    const pos = this.walkers.map(base => `${flights[base - 1]} Flight`);
                    let joined;
                    if (pos.length === 1) {
                        joined = pos[0];
                    } else {
                        joined = pos.slice(0, -1).join(", ") + (pos.length > 2 ? "," : "") + " and " + pos[pos.length - 1];
                    }
                    this.gameLog.push(`${pos.length > 1 ? "Walkers at" : "Walker at"} ${joined}`);
                }
            }

            resetHalf() {
                this.walkers = [];
                this.deaths = 0;
                this.rollCount = 0;
            }

            switchHalf() {
                const isTop = this.half_degree === "Top";
                const prevTeam = this.current_team;
                this.gameLog.push(`<span class="text-limegreen">*****************************************************</span>`);
                this.gameLog.push("The Shadow Aspirant now withdraws to stretch and catch their breath, hearing dark, empowering music in the distance...");
                this.gameLog.push(`<span class="${this.getTeamSpan(prevTeam)}">${prevTeam}</span> attained ${this.asc_this_degree[prevTeam]} Ascensions.`);
                if (isTop) {
                    if (this.degree >= 3 && this.asc_this_degree[prevTeam] === 0 && this.degree_wins[this.home_team] >= 2) {
                        this.degree_wins[this.home_team] += 1;
                        this.gameLog.push(`<span class="text-warning"><span class="${this.getTeamSpan(this.home_team)}">${this.home_team}</span> claims victory with advantage! Opponent failed to Ascend any beyond the 3rd Flight in the Spirit phase.</span>`);
                        this.checkGameOver();
                        return;
                    }
                    this.half_degree = "Bottom";
                    this.current_team = this.home_team;
                    this.gameLog.push(`<span class="${this.getTeamSpan(this.current_team)}">${this.current_team}</span> now seeks Ascension.`);
                    this.resetHalf();
                } else {
                    const awayAsc = this.asc_this_degree[this.away_team];
                    const homeAsc = this.asc_this_degree[this.home_team];
                    let winner;
                    if (awayAsc > homeAsc) {
                        winner = this.away_team;
                    } else if (homeAsc > awayAsc) {
                        winner = this.home_team;
                    } else if (awayAsc === 3 && homeAsc === 3) {
                        this.gameLog.push("Ascensions tied at 3! The battle must be repeated.");
                        this.asc_this_degree = { "Lightbringers": 0, "Shadowcasters": 0 };
                        this.resetHalf();
                        this.half_degree = "Top";
                        this.current_team = this.away_team;
                        this.logDegreeStart();
                        return;
                    } else {
                        this.gameLog.push("Ascensions tied! The battle must be repeated.");
                        this.asc_this_degree = { "Lightbringers": 0, "Shadowcasters": 0 };
                        this.resetHalf();
                        this.half_degree = "Top";
                        this.current_team = this.away_team;
                        this.logDegreeStart();
                        return;
                    }
                    this.degree_wins[winner] += 1;
                    const degreeName = this.getDegreeName(this.degree);
                    this.gameLog.push(`<span class="${this.getTeamSpan(winner)}">${winner}</span> has ascended victorious through ${degreeName}.`);
                    this.gameLog.push(`Ascensions of the ${this.degree}°: <span class="${this.getTeamSpan("Lightbringers")}">Lightbringers</span> ${this.asc_this_degree["Lightbringers"]} - <span class="${this.getTeamSpan("Shadowcasters")}">Shadowcasters</span> ${this.asc_this_degree["Shadowcasters"]}`);
                    this.gameLog.push(`Degrees Complete: <span class="${this.getTeamSpan("Lightbringers")}">Lightbringers</span> ${this.degree_wins["Lightbringers"]} - <span class="${this.getTeamSpan("Shadowcasters")}">Shadowcasters</span> ${this.degree_wins["Shadowcasters"]}`);
                    this.checkGameOver();
                    if (this.game_over) return;
                    this.degree += 1;
                    if (this.degree > 5) {
                        this.game_over = true;
                        return;
                    }
                    this.asc_this_degree = { "Lightbringers": 0, "Shadowcasters": 0 };
                    this.resetHalf();
                    this.half_degree = "Top";
                    this.current_team = this.away_team;
                    this.logDegreeStart();
                }
            }

            checkGameOver() {
                if (this.degree_wins["Lightbringers"] >= 3 || this.degree_wins["Shadowcasters"] >= 3) {
                    const overallWinner = this.degree_wins["Lightbringers"] >= 3 ? "Lightbringers" : "Shadowcasters";
                    this.gameLog.push("Game over!");
                    this.gameLog.push(`<span class="${this.getTeamSpan(overallWinner)}">${overallWinner}</span> has attained Shadow Mastery upon Ascending the Shadow Spire!`);
                    this.game_over = true;
                }
            }
        }

        // Global game instance
        let game = new ShadowSpireAscension();

        function rollBones() {
            if (!game.game_over) {
                const didSwitch = game.processPlay();
                if (!game.game_over && !didSwitch) {
                    game.updateStatus();
                }
                $("#gameOutput").html(game.gameLog.join("\n"));
            } else {
                $("#gameOutput").html(game.gameLog.join("\n") + "\nGame is over! Click 'Roll Your Bones' to start a new game.");
                $("#rollBonesBtn").one("click", function() {
                    game = new ShadowSpireAscension();
                    $("#gameOutput").html(game.gameLog.join("\n"));
                });
            }
            const gameOutput = $("#gameOutput")[0];
            gameOutput.scrollTop = gameOutput.scrollHeight;
        }

        $(document).ready(function() {
            $("#rollBonesBtn").click(function() {
                rollBones();
            });
            $("#gameOutput").html(game.gameLog.join("\n"));
        });
    </script>

	<!--Speed Trainer Metronome-->
	
	<div class="container metronome-container" id="metronome">
            <h1 class="text-center mb-4">speed trainer metronome</h1>
            <div id="circles" class="text-center mb-4"></div>
            <div class="controls">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label for="bpm" class="form-label" align="center">BPM: <span id="bpmValue">100</span></label>
                        <input type="range" class="form-range" id="bpm" min="20" max="500" value="100">
                    </div>
                    <div class="col-md-4">
                        <label for="timeSignature" class="form-label" align="center">Time Signature</label>
                        <select class="form-select" id="timeSignature">
                            <option value="3">3/4</option>
                            <option value="4" selected>4/4 (Default)</option>
                            <option value="5">5/4</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label for="tone" class="form-label" align="center">Tone</label>
                        <input type="range" class="form-range" id="tone" min="200" max="1000" value="600">
                    </div>
                </div>
                <div class="row g-3 mt-3">
                    <div class="col-md-4">
                        <label for="bpmChange" class="form-label" align="center">Tempo Change (BPM)</label>
                        <input type="number" class="form-control" id="bpmChange" min="0" max="50" value="0">
                    </div>
                    <div class="col-md-4">
                        <label for="bars" class="form-label" align="center">Bars per Tempo Change</label>
                        <input type="number" class="form-control" id="bars" min="1" value="4">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" align="center">Increase or Decrease Tempo?</label>
                        <select class="form-select" id="direction">
                            <option value="increase">Increase</option>
                            <option value="decrease">Decrease</option>
                        </select>
                    </div>
                </div>
                <div class="text-center mt-4">
                    <button id="startStop" class="btn btn-danger">Start</button>
                    <button id="reset" class="btn btn-danger ms-2">Reset</button>
                </div>
            </div>
        </div>
		
		
		
		
		
		
	
	<script>
		$(document).ready(function() {
    let isPlaying = false;
    let currentBeat = 0;
    let intervalId = null;
    let beatsPerMeasure = 4;
    let currentBpm = 120;
    let barCount = 0;
    let emphasisBeats = new Set();
    
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    
    function createCircles(num) {
        $('#circles').empty();
        emphasisBeats.clear();
        for (let i = 0; i < num; i++) {
            $('#circles').append(`<div class="circle" data-beat="${i}"></div>`);
        }
    }

    function playClick(frequency, isEmphasis) {
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.frequency.value = isEmphasis ? frequency * 1.2 : frequency;
        oscillator.type = 'square';
        
        gainNode.gain.setValueAtTime(1, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
        
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.1);
    }

    function updateMetronome() {
        $('.circle').removeClass('active');
        const $currentCircle = $(`.circle[data-beat="${currentBeat}"]`);
        $currentCircle.addClass('active');
        
        const tone = parseInt($('#tone').val());
        const isEmphasis = emphasisBeats.has(currentBeat);
        playClick(tone, isEmphasis);

        currentBeat = (currentBeat + 1) % beatsPerMeasure;
        
        if (currentBeat === 0) {
            barCount++;
            const barsPerChange = parseInt($('#bars').val());
            if (barCount >= barsPerChange) {
                adjustBpm();
                barCount = 0;
            }
        }
    }

    function adjustBpm() {
        const change = parseInt($('#bpmChange').val());
        const direction = $('#direction').val();
        
        // Only adjust BPM if change is greater than 0
        if (change > 0) {
            if (direction === 'increase' && currentBpm + change <= 500) {
                currentBpm += change;
            } else if (direction === 'decrease' && currentBpm - change >= 20) {
                currentBpm -= change;
            }
            $('#bpm').val(currentBpm);
            $('#bpmValue').text(currentBpm);
            if (isPlaying) {
                clearInterval(intervalId);
                intervalId = setInterval(updateMetronome, 60000 / currentBpm);
            }
        }
        // If change is 0, no adjustment happens
    }

    function resetMetronome() {
        currentBeat = 0;
        barCount = 0;
        $('.circle').removeClass('active');
    }

    // Initial setup
    createCircles(beatsPerMeasure);

    // Event handlers
    $('#startStop').click(function() {
        if (!isPlaying) {
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            isPlaying = true;
            $(this).text('Stop');
            intervalId = setInterval(updateMetronome, 60000 / currentBpm);
        } else {
            isPlaying = false;
            $(this).text('Start');
            clearInterval(intervalId);
        }
    });

    $('#reset').click(function() {
        if (!isPlaying) {
            resetMetronome();
        }
    });

    $('#bpm').on('input', function() {
        currentBpm = parseInt($(this).val());
        $('#bpmValue').text(currentBpm);
        if (isPlaying) {
            clearInterval(intervalId);
            intervalId = setInterval(updateMetronome, 60000 / currentBpm);
        }
    });

    $('#timeSignature').change(function() {
        beatsPerMeasure = parseInt($(this).val());
        createCircles(beatsPerMeasure);
        currentBeat = 0;
        barCount = 0;
        if (!isPlaying) {
            resetMetronome();
        }
    });

    $(document).on('click', '.circle', function() {
        const beat = parseInt($(this).data('beat'));
        if (emphasisBeats.has(beat)) {
            emphasisBeats.delete(beat);
            $(this).removeClass('emphasis');
        } else {
            emphasisBeats.add(beat);
            $(this).addClass('emphasis');
        }
    });
});
	</script>
