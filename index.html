    <style>
        :root {
            --player1-color: #32CD32;
            --player2-color: #FF0000;
        }
        .text-player1 { color: var(--player1-color); }
        .text-player2 { color: var(--player2-color); }
        body { background-color: #303030; }
      
        h1 { color: #bfbfbf; font-size: 50px; font-family: 'UnifrakturMaguntia', Verdana, cursive; padding-top: 0px; }
        h2 { color: #bfbfbf; font-size: 25px; font-family: 'Metal Mania', Verdana, cursive; padding-top: 25px; }

        #deathmask { display: flex; justify-content: center; }
        hr.glow {
            border: none; height: 2px; width: 70%; margin: 30px auto;
            background: linear-gradient(to right, transparent, #ffffff 30%, #ffffff 70%, transparent);
            box-shadow: 0 0 10px rgba(50, 205, 50, 0.45); opacity: 0.85;
        }
        @keyframes breatheExpand {
            0% { opacity: 0.50; width: 40%; }
            50% { opacity: 0.90; width: 80%; }
            100% { opacity: 0.50; width: 40%; }
        }
        hr.glow.animate-breathe { animation: breatheExpand 10s infinite ease-in-out; }

        .breathing-glow {
            border: 1px solid #555;
            box-shadow: 0 0 6px rgba(200, 200, 200, 0.15);
            animation: subtleGreyPulse 10s infinite ease-in-out;
        }
        @keyframes subtleGreyPulse {
            0%, 100% { box-shadow: 0 0 6px rgba(200, 200, 200, 0.15); }
            50% { box-shadow: 0 0 12px rgba(200, 200, 200, 0.4); }
        }



/* Shadow Spire Ascension Style */ 

        .game-container { max-width: 600px; margin: 20px auto; }
        .game-output {
            font-family: monospace;
            background-color: #000000;
            padding: 12px;
            border-radius: 6px;
            height: 670px;
            overflow-y: auto;
            white-space: pre-wrap;
            text-align: left;
            color: #ffffff;
        }
        .text-limegreen { color: #32CD32; }
        .text-warning { color: #ffc107; }
        .roll-number, .number { color: #aaaaaa; }
		
		.form-select {
            background-color: #ffffff;
            color: #000000;
            border: 1px solid #ced4da;
        }
        .form-select:focus {
            border-color: #80bdff;
            box-shadow: 0 0 0 0.2rem rgba(0,123,255,.25);
        }
        #player1Select, #player2Select {
            background-color: #000000;
            color: #ffffff;
        }
        #player1Select option, #player2Select option {
            background-color: #000000;
            color: #ffffff;
        }
		
		/* Danger red focus border for player dropdowns */
		#player1Select:focus,
		#player2Select:focus {
			border-color: #dc3545 !important;           /* Bootstrap danger red border on focus */
			box-shadow: 0 0 0 0.2rem rgba(220, 53, 69, 0.25) !important;  /* matching red glow */
		}

        .player-label {
            color: #cccccc;
            font-weight: 500;
        }
        #riddleModal .modal-content {
            background-color: #111;
            color: #ddd;
            border: 1px solid #444;
        }
        #riddleModal .modal-header {
            border-bottom: 1px solid #444;
        }
        #riddleModal .modal-footer {
            border-top: 1px solid #444;
        }
		

/* Cartomancy Styling */
        .cartomancy-container { max-width: 600px; margin: 30px auto; padding: 20px; }
        .cartomancy-output {
            font-family: monospace;
            background-color: #000000;
            padding: 15px;
            border-radius: 6px;
            height: 530px;
            overflow-y: auto;
            white-space: pre-wrap;
            text-align: left;
            color: #ffffff;
            border: 1px solid #444;
            line-height: 1.6;
        }
        .cartomancy-title {
            color: #bfbfbf;
            font-size: 50px;
            font-family: 'UnifrakturMaguntia', Verdana, cursive;
            text-align: center;
            margin-bottom: 15px;
        }

        .cartomancy-output .draw-header { color: #888888; font-weight: bold; }
        /* Grey - draw header */
		.cartomancy-output .card-name   { color: #ffc107; }   /* Yellow - card names */
        .cartomancy-output .number      { color: #aaaaaa; }   /* Grey - D-value and numbers */
        .cartomancy-output .separator   { color: #32CD32; }
		/* Green - asterisks */
        .cartomancy-output .meaning     { color: #dc3545; }   /* Red - meanings */

        .cartomancy-btn {
            padding: 12px 25px;
            margin: 8px;
            font-size: 16px;
            background: #333;
            color: white;
            border: 1px solid #dc3545;
            border-radius: 4px;
            box-shadow: 0 0 8px rgba(220, 53, 69, 0.4);
            transition: all 0.2s;
        }
        .cartomancy-btn:hover {
            background: #dc3545;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(220, 53, 69, 0.7);
        }
		
		
		
/* Shade Blade Sorcery (Scoundrel+ Solitaire) Style */ 
		.scoundrel-container { max-width: 600px; margin: 30px auto; padding: 20px; }
        .scoundrel-output {
            font-family: monospace;
            background-color: #000000;
            padding: 15px;
            border-radius: 6px;

        .scoundrel-title {
            color: #bfbfbf;
            font-size: 50px;
            font-family: 'UnifrakturMaguntia', Verdana, cursive;
            text-align: center;

        }
		.scoundrel-subtitle {
            color: #bfbfbf;
            font-size: 30px;
            font-family: 'UnifrakturMaguntia', Verdana, cursive;
            text-align: center;
            margin-bottom: 15px;
        }
		
		.scoundrel-output .gen-head { color: #ffffff; font-weight: bold; font-size: 30px; font-family: 'UnifrakturMaguntia', Verdana, cursive; text-align: center; } /* Red - General Header Text */
		
		.scoundrel-output .sbs-names   { color: #32CD32; font-weight: bold; font-size: 20px; font-family: 'Metal Mania', Verdana, cursive; text-align: center; }
		/* Green - Shade Blade Sorcery Cards Names */
		
        .scoundrel-output .sbs-jokers   { color: #ffc107; font-weight: bold; font-size: 20px; font-family: 'Metal Mania', Verdana, cursive; text-align: center; }   /* Green - Jokers */
		
		.scoundrel-output .sbs-aces   { color: #ffc107; font-weight: bold; font-size: 20px; font-family: 'Metal Mania', Verdana, cursive; text-align: center; }   /* Yellow - Aces */
		
		.scoundrel-output .blacks      { color: #32CD32; font-weight: bold; font-size: 20px; font-family: 'Metal Mania', Verdana, cursive; text-align: center; }   /* Green - Black Cards */
		
        .scoundrel-output .reds     { color: #dc3545; font-weight: bold; font-size: 20px; font-family: 'Metal Mania', Verdana, cursive; text-align: center; }   /* Red - Red Cards */
		
		.scoundrel-output .sm-reds { color: #dc3545; font-weight: bold; font-size: 18px;} /* Red - Small Red Text */
		
		.scoundrel-output .number      { color: #aaaaaa; }   /* Grey - Numbers */
		
		
		
/* Metronome Style */ 
        .metronome-container { padding: 20px; }
        .circle {
            width: 50px; height: 50px; border-radius: 50%; background-color: #495057;
            margin: 10px; display: inline-block; cursor: pointer; transition: all 0.2s;
        }
        .circle.active { background-color: #dc3545; }
        .circle.emphasis { border: 3px solid #ffc107; }
        .controls { max-width: 600px; margin: 20px auto; }
        .form-label { color: #ffffff; }
        .form-range::-webkit-slider-thumb { background-color: #32CD32; }
        .form-range::-moz-range-thumb { background-color: #32CD32; }
        .form-range::-ms-thumb { background-color: #32CD32; }
        .form-range:focus::-webkit-slider-thumb { box-shadow: 0 0 0 1px #fff, 0 0 0 0.25rem rgba(50, 205, 50, 0.25); }
        .form-range:focus::-moz-range-thumb { box-shadow: 0 0 0 1px #fff, 0 0 0 0.25rem rgba(50, 205, 50, 0.25); }
        .form-range:focus::-ms-thumb { box-shadow: 0 0 0 1px #fff, 0 0 0 0.25rem rgba(50, 205, 50, 0.25); }
        .footer {
            margin-top: 0;
            font-size: 14px;
            padding-bottom: 25px;
            color: #666;
        }

        .footer { margin-top: 0; font-size: 14px; padding-bottom: 25px; color: #666; }
    </style>
</head>

            rollDice() {
                return [Math.floor(Math.random() * 6) + 1, Math.floor(Math.random() * 6) + 1];
            }
            getRandomStatement(type) {
                const arr = this.statements[type];
                return arr[Math.floor(Math.random() * arr.length)];
            }
            getPlayerName(team) {
                return this[team + 'Name'];
            }
            getTeamClass(team) {
                return team === 'player1' ? 'text-player1' : 'text-player2';
            }
            determineFirst() {
                let lightRoll, shadowRoll;
                while (true) {
                    this.gameLog.push(`<span class="text-limegreen">*****************************************************</span>`);
                    lightRoll = this.rollDice().reduce((a, b) => a + b, 0);
                    shadowRoll = this.rollDice().reduce((a, b) => a + b, 0);
                    this.gameLog.push(`<span class="${this.getTeamClass('player1')}">${this.getPlayerName('player1')}</span> rolled: <span class="roll-number">${lightRoll}</span>`);
                    this.gameLog.push(`<span class="${this.getTeamClass('player2')}">${this.getPlayerName('player2')}</span> rolled: <span class="roll-number">${shadowRoll}</span>`);
                    if (lightRoll !== shadowRoll) {
                        if (lightRoll < shadowRoll) {
                            this.away_team = 'player1';
                            this.home_team = 'player2';
                            this.gameLog.push(`<span class="${this.getTeamClass('player1')}">${this.getPlayerName('player1')}</span> will approach the Spire first.`);
                            this.gameLog.push(`<span class="${this.getTeamClass('player2')}">${this.getPlayerName('player2')}</span> has the advantage.`);
                        } else {
                            this.away_team = 'player2';
                            this.home_team = 'player1';
                            this.gameLog.push(`<span class="${this.getTeamClass('player2')}">${this.getPlayerName('player2')}</span> will approach the Spire first.`);
                            this.gameLog.push(`<span class="${this.getTeamClass('player1')}">${this.getPlayerName('player1')}</span> has the advantage.`);
                        }
                        break;
                    } else {
                        this.gameLog.push("It's a draw! Rolling again.");
                    }
                }
                this.current_team = this.away_team;
            }
            logDegreeStart() {
                let startText = "The Trial of the Body now begins… You have no foundation without a strong, supple, resilient body. Raise your hood, unsheath your blade, FOCUS, MOVE, and STRIKE forth. Pain is both inevitable and necessary. Suffering is endless opportunity. Embrace it, endure it, be purified and hardened by it - and perpetually prove your might. Incipit Chaos!";
                this.gameLog.push(`<span class="text-limegreen">*****************************************************</span>`);
                this.gameLog.push(startText);
                this.gameLog.push(`<span class="text-limegreen">*****************************************************</span>`);
            }

            // All other methods below are copied directly from your last working version
            processPlay() {
                if (this.deaths >= 3 || this.asc_this_degree[this.current_team] >= 3) {
                    this.switchHalf();
                    return true;
                }
                this.rollCount++;
                const [d1, d2] = this.rollDice();
                const rollSum = d1 + d2;
                this.gameLog.push(`<span class="${this.getTeamClass(this.current_team)}">${this.getPlayerName(this.current_team)}</span> rolled <span class="roll-number">${d1}</span> and <span class="roll-number">${d2}</span> (Total: <span class="roll-number">${rollSum}</span>)`);
                let statement;
                if ([2, 12].includes(rollSum)) {
                    statement = rollSum === 2 ? "Wielding the Shade Blade - a masterful extension of the aura - the Seeker thrusts forth all Shadows to Ascension." : "Concealed by the legendary Shade Cloak, which renders thee invisible to all adversaries, the Seeker enshrouds and ushers forth all Shadows to Ascension.";
                    this.gameLog.push(`<span class="text-warning">${statement}</span>`);
                    this.scoreAscensions(this.Seekers.length + 1);
                    this.Seekers = [];
                } else if (rollSum === 3) {
                    statement = "Triple Flight - You enter a trance-induced Portal of Triarchic Discipline to the 3rd Flight, and advance any forces ahead.";
                    this.gameLog.push(`<span class="text-warning">${statement}</span>`);
                    this.advanceSeekers(3);
                } else if (rollSum === 11) {
                    statement = "Double Flight - You enter a trance-induced Portal of Duality to the 2nd Flight, and advance any forces ahead.";
                    this.gameLog.push(`<span class="text-warning">${statement}</span>`);
                    this.advanceSeekers(2);
                } else if ([4, 10].includes(rollSum)) {
                    statement = this.getRandomStatement("single");
                    this.gameLog.push(`<span class="text-warning">${statement}</span>`);
                    this.advanceSeekers(1);
                } else if (rollSum === 5) {
                    statement = this.getRandomStatement("death5");
                    this.gameLog.push(`<span class="text-warning">${statement}</span>`);
                    this.deaths += 1;
                } else if (rollSum === 6) {
                    statement = this.getRandomStatement("death6");
                    this.gameLog.push(`<span class="text-warning">${statement}</span>`);
                    this.deaths += 1;
                } else if (rollSum === 9) {
                    this.processSacrificialDeath();
                } else if (rollSum === 7) {
                    this.processShadowDuel();
                } else if (rollSum === 8) {
                    this.processBossEncounter();
                }
                if (this.asc_this_degree[this.current_team] >= 3) {
                    this.gameLog.push(`<span class="text-limegreen">*****************************************************</span>`);
                    this.gameLog.push(`<span class="text-warning">${this.getPlayerName(this.current_team)} has attained maximum Ascensions! This attempt has come to an end.</span>`);
                    this.switchHalf();
                    return true;
                }
                if (this.half_degree === "Bottom" && this.asc_this_degree[this.current_team] > this.asc_this_degree[this.away_team]) {
                    this.gameLog.push(`<span class="text-warning">${this.getPlayerName(this.current_team)} has surpassed the opponent! This section of the spire has come to an end.</span>`);
                    this.switchHalf();
                    return true;
                }
                if (this.deaths >= 3) {
                    this.switchHalf();
                    return true;
                }
                return false;
            }

            advanceSeekers(advancement) {
                let scored = 0;
                const newSeekers = [];
                for (const base of this.Seekers.sort((a, b) => a - b)) {
                    const newBase = base + advancement;
                    if (newBase > 3) scored += 1;
                    else newSeekers.push(newBase);
                }
                if (advancement > 0) newSeekers.push(Math.min(advancement, 3));
                this.Seekers = newSeekers.sort((a, b) => a - b);
                this.scoreAscensions(scored);
            }

            scoreAscensions(num) {
                const current = this.asc_this_degree[this.current_team];
                const toAdd = Math.min(num, 3 - current);
                this.asc_this_degree[this.current_team] += toAdd;
                if (toAdd > 0) {
                    this.gameLog.push(`<span class="number">${toAdd}</span> <span class="text-warning">Ascension${toAdd > 1 ? "s" : ""} attained!</span>`);
                }
                if (toAdd < num) {
                    this.gameLog.push(`<span class="text-warning">Ascensions capped at maximum of 3; </span><span class="number">${num - toAdd}</span> <span class="text-warning">soul lost to the shadows.</span>`);
                }
            }

            advanceWalk() {
                if (this.Seekers.length < 3) {
                    this.Seekers.sort((a, b) => a - b);
                    if (!this.Seekers.includes(1)) this.Seekers.push(1);
                    else if (!this.Seekers.includes(2)) {
                        this.Seekers[this.Seekers.indexOf(1)] = 2;
                        this.Seekers.push(1);
                    } else if (!this.Seekers.includes(3)) {
                        this.Seekers[this.Seekers.indexOf(2)] = 3;
                        this.Seekers[this.Seekers.indexOf(1)] = 2;
                        this.Seekers.push(1);
                    }
                } else {
                    this.scoreAscensions(1);
                }
                this.Seekers = this.Seekers.sort((a, b) => a - b);
            }

            processSacrificialDeath() {
                const statement = this.getRandomStatement("sac9");
                this.gameLog.push(`<span class="text-warning">${statement}</span>`);
                if (!this.Seekers.length) {
                    this.deaths += 1;
                } else if (this.deaths === 2) {
                    this.gameLog.push(`<span class="text-warning">Sacrificial Death with <span class="roll-number">2</span> Deaths already; Seekers do not advance.</span>`);
                    this.deaths += 1;
                } else {
                    let scored = 0;
                    if (this.Seekers.includes(3)) {
                        scored += 1;
                        this.Seekers.splice(this.Seekers.indexOf(3), 1);
                    }
                    if (this.Seekers.includes(2)) this.Seekers[this.Seekers.indexOf(2)] = 3;
                    if (this.Seekers.includes(1)) this.Seekers[this.Seekers.indexOf(1)] = 2;
                    this.deaths += 1;
                    this.scoreAscensions(scored);
                }
            }

            processShadowDuel() {
                const initStmt = this.getRandomStatement("shadowInit");
                this.gameLog.push(`<span class="text-warning">${initStmt}</span>`);
                let batterSum, oppSum;
                do {
                    const batterRoll = this.rollDice();
                    const oppRoll = this.rollDice();
                    batterSum = batterRoll[0] + batterRoll[1];
                    oppSum = oppRoll[0] + oppRoll[1];
                    this.gameLog.push(`Your roll: <span class="roll-number">${batterSum}</span> | Opponent's roll: <span class="roll-number">${oppSum}</span>`);
                    if (batterSum === oppSum) {
                        this.gameLog.push(`<span class="text-warning">Blows are parried effectively; the duel intensifies - roll again.</span>`);
                    }
                } while (batterSum === oppSum);
                let outcomeStmt;
                if (batterSum > oppSum) {
                    outcomeStmt = this.getRandomStatement("shadowWin");
                    this.gameLog.push(`<span class="text-warning">${outcomeStmt}</span>`);
                    this.advanceWalk();
                } else {
                    outcomeStmt = this.getRandomStatement("shadowLose");
                    this.gameLog.push(`<span class="text-warning">${outcomeStmt}</span>`);
                    this.deaths += 1;
                }
            }

            processBossEncounter() {
                let boss;
                if (this.degree === 1) boss = 'wraith';
                else if (this.degree === 2) boss = 'scholar';
                else if (this.degree === 3) boss = 'hierophant';
                else {
                    const bosses = ['wraith', 'scholar', 'hierophant'];
                    boss = bosses[Math.floor(Math.random() * bosses.length)];
                }
                const initStmt = this.getRandomStatement(boss + 'Init');
                this.gameLog.push(`<span class="text-warning">${initStmt}</span>`);
                let success = false;
                if (boss === 'wraith') {
                    let batterSum, oppSum;
                    do {
                        const batterRoll = this.rollDice();
                        const oppRoll = this.rollDice();
                        batterSum = batterRoll[0] + batterRoll[1];
                        oppSum = oppRoll[0] + oppRoll[1];
                        this.gameLog.push(`Your roll: <span class="roll-number">${batterSum}</span> | Opponent's roll: <span class="roll-number">${oppSum}</span>`);
                        if (batterSum === oppSum) this.gameLog.push(`<span class="text-warning">Blows are parried effectively; the duel intensifies - roll again.</span>`);
                    } while (batterSum === oppSum);
                    success = batterSum > oppSum;
                } else if (boss === 'scholar') {
                    const riddle = this.riddles[Math.floor(Math.random() * this.riddles.length)];
                    $('#riddleText').text(riddle.riddle + "\n\nAm I " + riddle.proposed + "?");
                    pendingScholarCorrect = riddle.correct;
                    const riddleModal = new bootstrap.Modal(document.getElementById('riddleModal'));
                    riddleModal.show();
                    return;
                } else if (boss === 'hierophant') {
                    const [d1, d2] = this.rollDice();
                    const cardSum = d1 + d2;
                    const card = this.tarotCards[cardSum];
                    this.gameLog.push(`Card drawn: <span class="text-warning">${card.name}</span> - ${card.desc}`);
                    const [o1, o2] = this.rollDice();
                    const omenSum = o1 + o2;
                    const isOdd = omenSum % 2 === 1;
                    this.gameLog.push(`Omen roll: <span class="roll-number">${o1}</span> + <span class="roll-number">${o2}</span> = <span class="roll-number">${omenSum}</span> (${isOdd ? 'odd' : 'even'})`);
                    success = isOdd;
                }
                let outcomeStmt;
                if (success) {
                    outcomeStmt = this.getRandomStatement(boss + (boss === 'hierophant' ? 'Favorable' : 'Win'));
                    this.gameLog.push(`<span class="text-warning">${outcomeStmt}</span>`);
                    if (this.Seekers.length === 0) this.Seekers.push(1);
                    else {
                        const lead = Math.max(...this.Seekers);
                        const index = this.Seekers.indexOf(lead);
                        const newLead = lead + 1;
                        if (newLead > 3) {
                            this.scoreAscensions(1);
                            this.Seekers.splice(index, 1);
                        } else this.Seekers[index] = newLead;
                    }
                } else {
                    outcomeStmt = this.getRandomStatement(boss + (boss === 'hierophant' ? 'Ill' : 'Lose'));
                    this.gameLog.push(`<span class="text-warning">${outcomeStmt}</span>`);
                    this.deaths += 1;
                    if (this.Seekers.length > 0) {
                        const lead = Math.max(...this.Seekers);
                        const index = this.Seekers.indexOf(lead);
                        this.Seekers.splice(index, 1);
                    }
                }
            }

            updateStatus() {
                this.printFlightStatus();
                this.gameLog.push(`Score: <span class="${this.getTeamClass('player1')}">${this.getPlayerName('player1')}</span> <span class="number">${this.asc_this_degree["player1"]}</span> - <span class="${this.getTeamClass('player2')}">${this.getPlayerName('player2')}</span> <span class="number">${this.asc_this_degree["player2"]}</span>`);
                this.gameLog.push(`Deaths: <span class="number">${this.deaths}</span>`);
                if (this.deaths < 3) this.gameLog.push(`<span class="text-limegreen">${"*".repeat(this.rollCount)}</span>`);
            }

            printFlightStatus() {
                const flights = ["1st", "2nd", "3rd"];
                if (!this.Seekers.length) {
                    this.gameLog.push("All Flights of the Spiral Stairway are empty.");
                } else {
                    const pos = this.Seekers.map(base => `${flights[base - 1]}`);
                    let joined = pos.length === 1 ? pos[0] : pos.slice(0, -1).join(", ") + (pos.length > 2 ? ", and " : " and ") + pos[pos.length - 1];
                    this.gameLog.push(`${pos.length > 1 ? "Seekers at" : "Seeker at"} ${joined} Flight`);
                }
            }

            resetHalf() {
                this.Seekers = [];
                this.deaths = 0;
                this.rollCount = 0;
            }

            switchHalf() {
                const isTop = this.half_degree === "Top";
                const prevTeam = this.current_team;
                this.gameLog.push(`<span class="text-limegreen">*****************************************************</span>`);
                this.gameLog.push(" The Shadow Aspirant has reached one of the spire's inner Void Chambers, free from the merciless violence of the toilsome ascent, but unaware of the total count of ascensions. <br> While awaiting the judgement of the Shadow Elders, to obtain the coveted Key to the Inner Circle, here rejuvenation is found within volcanic steam, allowing one to indulge in a moment of healing - to briefly drop their guard, stretch aching muscles, breathe in unison with their increasingly glowing aura, and imbibe their potent brew while peering out through the cracks on a multitude of jagged architecture - hearing dark, empowering chants, chimes, rhythms, and strings in the distance... <br> Rival Shadows, and other ghastly wraiths, are surely not far away.");
                this.gameLog.push(`<span class="text-limegreen">*****************************************************</span>`);
                this.gameLog.push(`<span class="${this.getTeamClass(prevTeam)}">${this.getPlayerName(prevTeam)}</span> attained <span class="number">${this.asc_this_degree[prevTeam]}</span> Ascensions.`);
                if (isTop) {
                    if (this.degree >= 3 && this.asc_this_degree[prevTeam] === 0 && this.degree_wins[this.home_team] >= 2) {
                        this.degree_wins[this.home_team] += 1;
                        this.gameLog.push(`<span class="text-warning"><span class="${this.getTeamClass(this.home_team)}">${this.getPlayerName(this.home_team)}</span> claims victory with advantage! Opponent failed to Ascend any beyond the 3rd Flight in the Spirit phase.</span>`);
                        this.checkGameOver();
                        return;
                    }
                    this.half_degree = "Bottom";
                    this.current_team = this.home_team;
                    this.gameLog.push(`<span class="${this.getTeamClass(this.current_team)}">${this.getPlayerName(this.current_team)}</span> now seeks Ascension.`);
                    this.gameLog.push(`<span class="text-limegreen">*****************************************************</span>`);
                    this.resetHalf();
                } else {
                    const awayAsc = this.asc_this_degree[this.away_team];
                    const homeAsc = this.asc_this_degree[this.home_team];
                    let winner;
                    if (awayAsc > homeAsc) winner = this.away_team;
                    else if (homeAsc > awayAsc) winner = this.home_team;
                    else if (awayAsc === 3 && homeAsc === 3) {
                        this.gameLog.push(`<span class="text-limegreen">*****************************************************</span>`);
                        this.gameLog.push("Ascensions tied at 3! The battle must be repeated from the stairway below.");
                        this.asc_this_degree = { player1: 0, player2: 0 };
                        this.resetHalf();
                        this.half_degree = "Top";
                        this.current_team = this.away_team;
                        this.logDegreeStart();
                        return;
                    } else {
                        this.gameLog.push(`<span class="text-limegreen">*****************************************************</span>`);
                        this.gameLog.push("Ascensions tied! The battle must be repeated.");
                        this.asc_this_degree = { player1: 0, player2: 0 };
                        this.resetHalf();
                        this.half_degree = "Top";
                        this.current_team = this.away_team;
                        this.logDegreeStart();
                        return;
                    }
                    this.degree_wins[winner] += 1;
                    const degreeName = this.getDegreeName(this.degree);
                    this.gameLog.push(`<span class="${this.getTeamClass(winner)}">${this.getPlayerName(winner)}</span> has ascended victorious through ${degreeName}.`);
                    this.gameLog.push(`Ascensions to Void Chamber #${this.degree}: <span class="${this.getTeamClass('player1')}">${this.getPlayerName('player1')}</span> <span class="number">${this.asc_this_degree["player1"]}</span> - <span class="${this.getTeamClass('player2')}">${this.getPlayerName('player2')}</span> <span class="number">${this.asc_this_degree["player2"]}</span>`);
                    this.gameLog.push(`Keys to the Inner Circles: <span class="${this.getTeamClass('player1')}">${this.getPlayerName('player1')}</span> <span class="number">${this.degree_wins["player1"]}</span> - <span class="${this.getTeamClass('player2')}">${this.getPlayerName('player2')}</span> <span class="number">${this.degree_wins["player2"]}</span>`);
                    this.checkGameOver();
                    if (this.game_over) return;
                    this.degree += 1;
                    if (this.degree > 5) {
                        this.game_over = true;
                        return;

                for (let i = 0; i < num; i++) $('#circles').append(`<div class="circle" data-beat="${i}"></div>`);
            }

            function playClick(frequency, isEmphasis) {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.frequency.value = isEmphasis ? frequency * 1.2 : frequency;
                oscillator.type = 'square';
                gainNode.gain.setValueAtTime(1, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.1);
            }

            function updateMetronome() {
                $('.circle').removeClass('active');
                const $currentCircle = $(`.circle[data-beat="${currentBeat}"]`);
                $currentCircle.addClass('active');
                const tone = parseInt($('#tone').val());
                const isEmphasis = emphasisBeats.has(currentBeat);
                playClick(tone, isEmphasis);
                currentBeat = (currentBeat + 1) % beatsPerMeasure;
                if (currentBeat === 0) {
                    barCount++;
                    const barsPerChange = parseInt($('#bars').val());
                    if (barCount >= barsPerChange) {
                        adjustBpm();
                        barCount = 0;
                    }
                }
            }

            function adjustBpm() {
                const change = parseInt($('#bpmChange').val());
                const direction = $('#direction').val();
                if (change > 0) {
                    if (direction === 'increase' && currentBpm + change <= 500) currentBpm += change;
                    else if (direction === 'decrease' && currentBpm - change >= 20) currentBpm -= change;
                    $('#bpm').val(currentBpm);
                    $('#bpmValue').text(currentBpm);
                    if (isPlaying) {
                        clearInterval(intervalId);
                        intervalId = setInterval(updateMetronome, 60000 / currentBpm);
                    }
                }
            }

            function resetMetronome() {
                currentBeat = 0;
                barCount = 0;
                $('.circle').removeClass('active');
            }

            createCircles(beatsPerMeasure);

            $('#startStop').click(function() {
                if (!isPlaying) {
                    if (audioContext.state === 'suspended') audioContext.resume();
                    isPlaying = true;
                    $(this).text('Stop');
                    intervalId = setInterval(updateMetronome, 60000 / currentBpm);
                } else {
                    isPlaying = false;
                    $(this).text('Start');
                    clearInterval(intervalId);
                }
            });

            $('#reset').click(function() {
                if (!isPlaying) resetMetronome();
            });

            $('#bpm').on('input', function() {
                currentBpm = parseInt($(this).val());
                $('#bpmValue').text(currentBpm);
                if (isPlaying) {
                    clearInterval(intervalId);
                    intervalId = setInterval(updateMetronome, 60000 / currentBpm);
                }
            });

            $('#timeSignature').change(function() {
                beatsPerMeasure = parseInt($(this).val());
                createCircles(beatsPerMeasure);
                currentBeat = 0;
                barCount = 0;
                if (!isPlaying) resetMetronome();
            });

            $(document).on('click', '.circle', function() {
                const beat = parseInt($(this).data('beat'));
                if (emphasisBeats.has(beat)) {
                    emphasisBeats.delete(beat);
                    $(this).removeClass('emphasis');
                } else {
                    emphasisBeats.add(beat);
                    $(this).addClass('emphasis');
                }
            });
        });
    </script>
</body>
</html>
